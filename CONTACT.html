<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WT - Contact Us</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="container flex-row justify-between align-center">
            <div class="logo">
                <a href="index.html">WT</a>
            </div>
            
            <nav class="main-nav">
                <ul class="nav-list flex-row">
                    <li><a href="index.html">HOME</a></li>
                    <li><a href="about.html">ABOUT</a></li>
                    <li><a href="contact.html" class="active">CONTACT</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main id="contact-page">
        <section class="container section-padding flex-row wrap justify-between">
            
            <div class="contact-info">
                
                <div class="info-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <p><strong>LOCATION</strong></p>
                    <p>#2661 Janakpuri Colony, city name, town name</p>
                </div>
                
                <div class="info-item">
                    <i class="fas fa-envelope"></i>
                    <p><strong>EMAIL</strong></p>
                    <p>harshitvashisth@mycompany.com</p>
                </div>
                
                <div class="info-item">
                    <i class="fas fa-phone-alt"></i>
                    <p><strong>CALL</strong></p>
                    <p>+910101010101</p>
                </div>

                <img src="Images/company-img.jpg" alt="Modern Building" class="contact-image">
            </div>

            <div class="contact-form-area">
                <h2>Contact Us</h2>
                <p>Let us know your questions, suggestions and concerns by filling out the contact form below.</p>
                
                <form action="#" class="contact-form">
                    <label for="username">Username*</label>
                    <input type="text" id="username" name="username" required>
                    
                    <label for="email">Email*</label>
                    <input type="email" id="email" name="email" required>

                    <label for="phone">Phone*</label>
                    <input type="tel" id="phone" name="phone" required>

                    <label for="message">Message*</label>
                    <textarea id="message" name="message" rows="6" required></textarea>

                    <button type="submit" class="btn btn-submit">SUBMIT</button>
                </form>
            </div>

        </section>
    </main>

    <footer class="main-footer">
        <div class="footer-social-icons">
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
        </div>
        <p>World Travel &copy; 2020, All Rights Reserved</p>
    
    </footer>

</body>
</html>
